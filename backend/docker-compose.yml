version: '3.3'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: bigskill
      POSTGRES_PASSWORD: bigskill_password
      POSTGRES_DB: bigskill_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"

  worker:
    build: .
    command: arq app.worker.WorkerSettings
    restart: always
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://bigskill:bigskill_password@db:5432/bigskill_db
      - REDIS_URL=redis://redis:6379/0
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - LLM_API_KEY=${LLM_API_KEY}

volumes:
  postgres_data:
